<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0bda50",
                        "background-light": "#f5f8f6",
                        "background-dark": "#102216",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<title>Signup - Finance Tracker</title>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex min-h-screen w-full flex-col items-center justify-center overflow-hidden p-4">
<div class="absolute inset-0 z-0">
<div class="absolute inset-0 bg-gradient-to-br from-background-dark via-[#142e1d] to-background-dark"></div>
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-primary/10 blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-primary/5 blur-[120px]"></div>
</div>
<div class="relative z-10 w-full max-w-[480px]">
<div class="flex flex-col items-center mb-8">
<div class="flex items-center gap-3 mb-2">
<div class="size-10 text-primary bg-primary/10 rounded-xl flex items-center justify-center">
<span class="material-symbols-outlined text-3xl">account_balance_wallet</span>
</div>
<h1 class="text-2xl font-bold tracking-tight text-slate-100">Finance Tracker</h1>
</div>
<p class="text-slate-400 text-sm">Join thousands of people managing their wealth</p>
</div>
<div class="bg-slate-900/40 backdrop-blur-xl border border-slate-800/50 rounded-2xl p-8 shadow-2xl">
<div class="mb-8">
<h2 class="text-3xl font-black text-slate-100 tracking-tight">Create Account</h2>
<p class="text-slate-400 mt-2">Start your financial journey today</p>
</div>
<form class="flex flex-col gap-5">
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-slate-300 ml-1">Full Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-xl">person</span>
<input class="w-full pl-12 pr-4 py-4 rounded-xl bg-slate-800/50 border border-slate-700/50 text-slate-100 placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all" placeholder="John Doe" type="text"/>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-slate-300 ml-1">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-xl">mail</span>
<input class="w-full pl-12 pr-4 py-4 rounded-xl bg-slate-800/50 border border-slate-700/50 text-slate-100 placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all" placeholder="name@example.com" type="email"/>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-slate-300 ml-1">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-xl">lock</span>
<input class="w-full pl-12 pr-12 py-4 rounded-xl bg-slate-800/50 border border-slate-700/50 text-slate-100 placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all" placeholder="ΓÇóΓÇóΓÇóΓÇóΓÇóΓÇóΓÇóΓÇó" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-300" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<div class="flex items-center gap-3 mt-2">
<input class="size-4 rounded border-slate-700 bg-slate-800 text-primary focus:ring-primary focus:ring-offset-slate-900" id="terms" type="checkbox"/>
<label class="text-xs text-slate-400" for="terms">
                            I agree to the <a class="text-primary hover:underline" href="#">Terms of Service</a> and <a class="text-primary hover:underline" href="#">Privacy Policy</a>
</label>
</div>
<button class="w-full py-4 bg-primary text-background-dark font-bold text-lg rounded-xl hover:opacity-90 active:scale-[0.98] transition-all shadow-lg shadow-primary/20 mt-4" type="submit">
                        Create Account
                    </button>
</form>
<div class="mt-8 flex items-center justify-center gap-2 border-t border-slate-800/50 pt-6">
<p class="text-slate-400">Already have an account?</p>
<a class="text-primary font-semibold hover:underline" href="#">Login</a>
</div>
</div>
<footer class="mt-8 text-center">
<p class="text-slate-500 text-xs">┬⌐ 2024 Finance Tracker Inc. Secure 256-bit SSL encrypted connection.</p>
</footer>
</div>
</div>
</body></html>
